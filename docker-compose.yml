services:
  web:
    build:
      context: ./app
      secrets:
        - cg_username
        - cg_password
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  db:
    image: cgr.dev/chainguard/postgres:latest@sha256:4047873982a3988af69abdf92b7791b221909913da4df2f52039d91d167d37fb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge

secrets:
  cg_username:
    environment: CHAINGUARD_PYTHON_IDENTITY_ID
  cg_password:
    environment: CHAINGUARD_PYTHON_TOKEN
